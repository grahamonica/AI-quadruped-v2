name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ai-quadruped:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run unit and regression checks in Docker
        timeout-minutes: 35
        run: docker run --rm ai-quadruped:test
